# Cap container logs so they can't grow unbounded — matters on SD-card hosts
# (e.g. a Raspberry Pi) where continuous writes are the main wear source.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # Named volumes are created root-owned; Vikunja runs as uid 1000.
  vikunja-init:
    image: alpine:3
    command: chown -R 1000 /db /files
    volumes:
      - vikunja_db:/db
      - vikunja_files:/files

  vikunja:
    image: vikunja/vikunja:2
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      vikunja-init:
        condition: service_completed_successfully
    ports:
      - "3456:3456"
    environment:
      VIKUNJA_SERVICE_PUBLICURL: ${VIKUNJA_PUBLIC_URL:-http://localhost:3456/}
      VIKUNJA_SERVICE_SECRET: ${VIKUNJA_SECRET:?set VIKUNJA_SECRET in .env (openssl rand -hex 32)}
      VIKUNJA_DATABASE_TYPE: sqlite
      VIKUNJA_DATABASE_PATH: /db/vikunja.db
    volumes:
      - vikunja_db:/db
      - vikunja_files:/app/vikunja/files
    healthcheck:
      test: ["CMD", "/app/vikunja/vikunja", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

  bot:
    build: ./bot
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - vikunja
    env_file: .env
    volumes:
      - bot_data:/data
    # Lets the container reach services on the host, e.g. Ollama at
    # http://host.docker.internal:11434/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  vikunja_db:
  vikunja_files:
  bot_data:
